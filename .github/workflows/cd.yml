name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site from Markdown
        run: |
          sudo apt-get install -y pandoc
          mkdir -p _site

          # Convert README to index.html
          pandoc README.md \
            --standalone \
            --metadata title="Wazuh Homelab SOC — Sagar Bidari" \
            --css https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.6.1/github-markdown.min.css \
            -o _site/index.html

          # Convert each doc
          mkdir -p _site/docs
          for f in docs/*.md; do
            name=$(basename "$f" .md)
            pandoc "$f" \
              --standalone \
              --metadata title="$name — Wazuh Homelab SOC" \
              --css https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.6.1/github-markdown.min.css \
              -o "_site/docs/${name}.html"
          done

          # Copy screenshots and diagrams
          cp -r screenshots _site/ 2>/dev/null || true
          cp -r diagrams _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
